      summary: Current user (roles + permissions)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: The authenticated user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthUser' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/auth/me/password:
    post:
      tags: [auth]
      summary: Change own password
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChangePasswordRequest' }
      responses:
        '204': { description: Password changed }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/auth/2fa/setup:
    post:
      tags: [auth]
      summary: Provision a pending TOTP secret
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: TOTP secret + otpauth URL (render as QR)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Setup2FAResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { description: 2FA already enabled }

  /api/auth/2fa/enable:
    post:
      tags: [auth]
      summary: Confirm TOTP and receive recovery codes
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Enable2FARequest' }
      responses:
        '200':
          description: One-time recovery codes (shown once)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Enable2FAResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/auth/2fa/disable:
    post:
      tags: [auth]
      summary: Disable TOTP
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Disable2FARequest' }
      responses:
        '204': { description: 2FA disabled }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/auth/users:
    get:
      tags: [auth]

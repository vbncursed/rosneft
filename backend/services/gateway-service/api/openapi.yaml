  /api/auth/roles/{slug}:
    parameters:
      - { in: path, name: slug, required: true, schema: { type: string } }
    patch:
      tags: [auth]
      summary: Rename a role (requires roles:manage)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateRoleRequest' }
      responses:
        '200':
          description: Updated role
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthRole' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [auth]
      summary: Delete a non-system role (requires roles:manage)
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { description: System role cannot be deleted }

  /api/auth/roles/{slug}/permissions:
    put:
      tags: [auth]
      summary: Replace a role's permissions (requires roles:manage)
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: slug, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SetRolePermissionsRequest' }
      responses:
        '200':
          description: Updated role
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthRole' }

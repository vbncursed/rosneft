name: andrey

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: andrey
      POSTGRES_USER: andrey
      POSTGRES_PASSWORD: andrey
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U andrey -d andrey"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  gateway:
    build:
      context: ./backend
      dockerfile: services/gateway-service/Dockerfile
    depends_on:
      catalog: { condition: service_started }
      mesh-api: { condition: service_started }
      upload: { condition: service_started }
      asset: { condition: service_started }
    environment:
      GATEWAY_HTTP_ADDR: ":8080"
      GATEWAY_CATALOG_GRPC_ADDR: "catalog:9001"
      GATEWAY_MESH_GRPC_ADDR: "mesh-api:9002"
      GATEWAY_UPLOAD_GRPC_ADDR: "upload:9003"
      GATEWAY_ASSET_HTTP_ADDR: "http://asset:8081"
      GATEWAY_ALLOWED_ORIGINS: "*"
      GATEWAY_LOG_LEVEL: "info"
      # Upload chunks can be hundreds of MB; raise WriteTimeout to give
      # the gateway → upload-service stream time to drain.
      GATEWAY_WRITE_TIMEOUT: "30m"
    ports:
      - "8080:8080"

  catalog:
    build:
      context: ./backend
      dockerfile: services/catalog-service/Dockerfile
    depends_on:
      postgres: { condition: service_healthy }
    expose:
      - "9001"
    environment:
      CATALOG_GRPC_ADDR: ":9001"
      CATALOG_DB_DSN: "postgres://andrey:andrey@postgres:5432/andrey?sslmode=disable"
      CATALOG_AUTO_MIGRATE: "true"
      CATALOG_LOG_LEVEL: "info"

  mesh-api:
    build:
      context: ./backend
      dockerfile: services/mesh-service/Dockerfile.api
    depends_on:
      redis: { condition: service_healthy }
      catalog: { condition: service_started }
    expose:
      - "9002"
    environment:
      MESH_GRPC_ADDR: ":9002"
      MESH_REDIS_ADDR: "redis:6379"
      MESH_CATALOG_GRPC_ADDR: "catalog:9001"
      MESH_LOG_LEVEL: "info"

  mesh-worker:
    build:
      context: ./backend
      dockerfile: services/mesh-service/Dockerfile.worker
    depends_on:
      redis: { condition: service_healthy }
      catalog: { condition: service_started }
    environment:
      MESH_REDIS_ADDR: "redis:6379"
      MESH_CATALOG_GRPC_ADDR: "catalog:9001"
      MESH_BLOB_DIR: "/var/blob"
      MESH_WORKER_NAME: "mesh-worker-1"
      MESH_LOG_LEVEL: "info"
      MESH_DRACO_ENABLED: "true"
      MESH_KTX2_ENABLED: "true"
      MESH_DRACO_BIN: "gltfpack"
      MESH_LOD_RATIOS: "0.5,0.25"
    volumes:
      # Named volume so Docker manages permissions: the volume is
      # initialised from /var/blob in the image (which the Dockerfile
      # pre-creates as nonroot:nonroot), so the worker writes without
      # the bind-mount root-owned-mountpoint problem. Source archives
      # uploaded via /api/uploads land here as content-addressed blobs;
      # the worker fetches them by hash, extracts to a tmpfs working
      # dir, and writes the converted GLBs back to the same store.
      - blob-data:/var/blob

  asset:
    build:
      context: ./backend
      dockerfile: services/asset-service/Dockerfile
    environment:
      ASSET_HTTP_ADDR: ":8081"
      ASSET_BLOB_DIR: "/var/blob"
      ASSET_LOG_LEVEL: "info"
    volumes:
      - blob-data:/var/blob:ro

  upload:
    build:
      context: ./backend
      dockerfile: services/upload-service/Dockerfile
    expose:
      - "9003"
    environment:
      UPLOAD_GRPC_ADDR: ":9003"
      UPLOAD_BLOB_DIR: "/var/blob"
      UPLOAD_INCOMING_DIR: "/var/upload/incoming"
      UPLOAD_MAX_UPLOAD_BYTES: "2147483648"
      UPLOAD_LOG_LEVEL: "info"
    volumes:
      # Writes finalized blobs to the same content-addressed volume the
      # mesh-worker reads from.
      - blob-data:/var/blob
      - upload-incoming:/var/upload/incoming

  frontend:
    # Build context is the frontend/ directory at the repo root.
    # NEXT_PUBLIC_API_URL is baked into the client bundle and must be
    # reachable from the BROWSER — useJobStream opens EventSource
    # against this URL directly to bypass Next.js's Node HTTP buffer
    # (proxy rewrites delay SSE frames until connection close).
    # GATEWAY_URL is the compose-internal hostname used by the
    # Next.js server for SSR fetches and the /api/* rewrite.
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Browser-side URL (baked into client bundle).
        NEXT_PUBLIC_API_URL: "http://localhost:8080"
        # Server-side URL (baked into Next.js routes manifest at build).
        # Must be the compose-internal hostname so the standalone server
        # can reach the gateway from inside the container.
        GATEWAY_URL: "http://gateway:8080"
    depends_on:
      gateway: { condition: service_started }
    environment:
      GATEWAY_URL: "http://gateway:8080"
      NEXT_PUBLIC_API_URL: "http://localhost:8080"
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  redis-data:
  blob-data:
  upload-incoming:

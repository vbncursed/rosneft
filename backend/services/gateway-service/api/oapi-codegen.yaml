# Configuration for oapi-codegen — schema-first server stub generation.
# Run via `make openapi-gen` from backend/.
#
# Two-pass generation: this config emits the chi/strict SERVER. Tags handled by
# custom root-router handlers are excluded from stub generation:
#   - auth   → plain-chi authhttp package (login must be public)
#   - assets → asset-service reverse proxy
#   - jobs   → SSE stream handler (WatchJobEvents)
# The FULL embedded spec (all tags, for Swagger) is generated separately by
# oapi-codegen-spec.yaml so the served docs stay complete.
package: httpapi

generate:
  chi-server: true        # github.com/go-chi/chi/v5 router
  models: true
  strict-server: true     # typed handler signatures with error returns

output: internal/transport/httpapi/openapi_gen.go

output-options:
  skip-prune: true
  exclude-tags:
    - auth
    - assets
    - jobs

openapi: 3.0.3
info:
  title: Rosneft Backend Gateway API
  version: 0.2.0
  description: |
    Public REST surface for the Rosneft 3D viewer frontend. Internal
    services (catalog, mesh, upload) are reached via gRPC; this gateway
    is the only externally exposed component.

    The catalog is split into two domains:
      • Territories — parent scenes the viewer renders as a canvas.
      • Models      — placeable 3D assets overlaid on a territory.

    Source files (OBJ + MTL + textures) are uploaded as a ZIP archive
    through the chunked /api/uploads endpoints; the resulting blob hash is
    then attached to a Territory or Model. The mesh-worker fetches the
    archive from BlobStore, runs the converter, and registers the GLB
    artifacts back in the catalog.

    Note: binary artifact streaming (`GET /api/assets/{hash}`) is
    implemented as a transparent reverse proxy to asset-service and is
    intentionally not described here as a typed endpoint — clients should
    treat it as raw binary content (`model/gltf-binary`) with Range, ETag,
    and immutable cache headers.
servers:
  - url: http://localhost:8080
    description: Local docker-compose

components:
  schemas:
    Vec3:
      type: object
      required: [x, y, z]
      properties:
        x: { type: number, format: double }
        y: { type: number, format: double }
        z: { type: number, format: double }

    Territory:
      type: object
      required: [slug, title, sourceBlobHash]
      properties:
        slug: { type: string }
        title: { type: string }
        description: { type: string }
        externalPanoramaUrl: { type: string }
        sourceBlobHash: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Model:
      type: object
      required: [slug, title, sourceBlobHash]
      properties:
        slug: { type: string }
        title: { type: string }
        description: { type: string }
        sourceBlobHash: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    LodArtifact:
      type: object
      required: [lod, hash, size]
      description: |
        Minimal descriptor for one LOD level. Carries only size/geometry
        stats — bbox, contentType, createdAt are LOD-invariant and live
        on the parent Artifact.
      properties:
        lod: { type: integer, format: int32, minimum: 0 }
        hash: { type: string }
        size: { type: integer, format: int64 }
        vertices: { type: integer, format: int64 }
        faces: { type: integer, format: int64 }

    Artifact:
      type: object
      required: [slug, lod, hash, contentType, size]
      properties:
        slug:
          type: string
          description: Owner slug (territory or model, depending on the endpoint).
        lod: { type: integer, format: int32, minimum: 0 }
        hash: { type: string }
        contentType: { type: string }
        size: { type: integer, format: int64 }
        vertices: { type: integer, format: int64 }
        faces: { type: integer, format: int64 }
        bboxMin: { $ref: '#/components/schemas/Vec3' }
        bboxMax: { $ref: '#/components/schemas/Vec3' }
        createdAt: { type: string, format: date-time }
        artifacts:
          type: array
          description: |
            All available LODs for this owner, sorted by lod ascending.
            Populated by /scene; absent on /artifacts list/get endpoints
            where the array would be redundant.
          items: { $ref: '#/components/schemas/LodArtifact' }

    JobStatus:
      type: string
      enum: [pending, running, succeeded, failed]

    JobKind:
      type: string
      description: Which catalog domain the job's outputs belong to.
      enum: [territory, model]

    Job:
      type: object
      required: [id, kind, slug, status]
      properties:
        id: { type: string }
        kind: { $ref: '#/components/schemas/JobKind' }
        slug: { type: string }
        status: { $ref: '#/components/schemas/JobStatus' }
        errorMessage: { type: string }
        artifactHash: { type: string }
        progress:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Fraction of conversion work completed (0..1).
        stage:
          type: string
          description: |
            Coarse-grained phase label set by the worker — one of
            "fetching" / "extracting" / "parsing" / "encoding" /
            "compressing" / "lod-N" / "registering".
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Placement:
      type: object
      required: [id, territorySlug, modelSlug, position, rotation, scale]
      properties:
        id: { type: integer, format: int64 }
        territorySlug: { type: string }
        modelSlug: { type: string }
        position: { $ref: '#/components/schemas/Vec3' }
        rotation: { $ref: '#/components/schemas/Vec3' }
        scale: { $ref: '#/components/schemas/Vec3' }
        label: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        visiblePanoramaIds:
          type: array
          description: >
            Allowlist of panorama ids this placement is shown in (panorama
            mode only — the 3D view always shows every placement). Empty means
            hidden in every panorama.
          items: { type: integer, format: int64 }
        panoramaLabels:
          type: array
          description: >
            Per-panorama names: the same placement may read differently in
            each panorama. Independent of visibility.
          items: { $ref: '#/components/schemas/PanoramaLabel' }

    PanoramaLabel:
      type: object
      required: [panoramaId, label]
      properties:
        panoramaId: { type: integer, format: int64 }
        label: { type: string }

    PlacementPanoramaLabelUpdate:
      type: object
      required: [label]
      properties:
        label:
          type: string
          description: New name; empty clears the placement's name in this panorama.

    PlacementCreate:
      type: object
      required: [modelSlug]
      properties:
        modelSlug: { type: string }
        position: { $ref: '#/components/schemas/Vec3' }
        rotation: { $ref: '#/components/schemas/Vec3' }
        scale: { $ref: '#/components/schemas/Vec3' }
        label: { type: string }
        visiblePanoramaIds:
          type: array
          description: Initial panorama allowlist (e.g. the active panorama).
          items: { type: integer, format: int64 }

    PlacementUpdate:
      type: object
      properties:
        position: { $ref: '#/components/schemas/Vec3' }
        rotation: { $ref: '#/components/schemas/Vec3' }
        scale: { $ref: '#/components/schemas/Vec3' }
        label: { type: string }

    PlacementVisibilityUpdate:
      type: object
      required: [panoramaIds]
      properties:
        panoramaIds:
          type: array
          description: Full replacement allowlist of panorama ids.
          items: { type: integer, format: int64 }

    Panorama:
      type: object
      required: [id, territorySlug, slug, title, sourceBlobHash, position, yawOffset]
      description: |
        Equirectangular panorama (Insta360 Pro source) anchored to a point
        in a territory's scene-units space. The viewer "panorama mode"
        teleports the camera to position and renders a sphere skybox;
        placements stay shared with the 3D view so equipment placed in
        either mode is visible from the other.
      properties:
        id: { type: integer, format: int64 }
        territorySlug: { type: string }
        slug: { type: string }
        title: { type: string }
        sourceBlobHash:
          type: string
          description: BlobStore hash for the equirect JPG/PNG; served via /api/assets/{hash}.
        position: { $ref: '#/components/schemas/Vec3' }
        yawOffset:
          type: number
          format: double
          description: |
            Rotation around the sphere's Y axis (radians) to align the
            panorama's implicit "north" with the territory's axes.
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    PanoramaCreate:
      type: object
      required: [title, sourceBlobHash]
      description: |
        Body for POST /api/territories/{slug}/panoramas. The slug is derived
        from the title by the catalog and made unique within the territory —
        it is not client-supplied.
      properties:
        title: { type: string }
        sourceBlobHash: { type: string }
        position: { $ref: '#/components/schemas/Vec3' }
        yawOffset: { type: number, format: double }

    PanoramaUpdate:
      type: object
      properties:
        title: { type: string }
        position: { $ref: '#/components/schemas/Vec3' }
        yawOffset: { type: number, format: double }

    EntityCreate:
      type: object
      required: [title, sourceBlobHash]
      description: |
        Body for POST /api/territories and POST /api/models. The client
        first uploads the source ZIP via /api/uploads, then attaches the
        returned hash here. The gateway forwards the entity to catalog
        and queues a conversion job; the response carries both the new
        entity and the queued Job for SSE subscription. The slug is derived
        from the title by the catalog and made unique — not client-supplied.
      properties:
        title: { type: string }
        description: { type: string }
        externalPanoramaUrl: { type: string }
        sourceBlobHash: { type: string }

    TerritoryUpdate:
      type: object
      description: |
        Body for PATCH /api/territories/{slug}. Updates mutable fields only;
        the source archive and conversion are untouched. Omitted fields are
        left unchanged.
      properties:
        externalPanoramaUrl: { type: string }

    TerritorySourceReplace:
      type: object
      required: [sourceBlobHash]
      description: |
        Body for POST /api/territories/{slug}/source. Carries the hash of a
        freshly uploaded ZIP (via /api/uploads); the territory's source is
        swapped to it and a new conversion is queued.
      properties:
        sourceBlobHash: { type: string }

    TerritoryCreated:
      type: object
      required: [territory, job]
      properties:
        territory: { $ref: '#/components/schemas/Territory' }
        job: { $ref: '#/components/schemas/Job' }

    ModelCreated:
      type: object
      required: [model, job]
      properties:
        model: { $ref: '#/components/schemas/Model' }
        job: { $ref: '#/components/schemas/Job' }

    AssetOption:
      type: object
      required: [slug, title, artifacts]
      properties:
        slug: { type: string }
        title: { type: string }
        bboxMin:
          $ref: '#/components/schemas/Vec3'
          description: |
            Original (pre-normalize) bounding-box minimum of the source
            mesh. Carried so the frontend can compute a real-size scale
            when dropping a model onto a territory.
        bboxMax:
          $ref: '#/components/schemas/Vec3'
          description: Original (pre-normalize) bounding-box maximum.
        artifacts:
          type: array
          description: |
            All available LODs for this model, sorted by lod ascending.
            Empty when the model has no successful conversion yet — the
            frontend can grey it out in the picker.
          items: { $ref: '#/components/schemas/LodArtifact' }

    SceneBundle:
      type: object
      required: [territory, placements, modelOptions]
      description: |
        Single-shot bundle for the viewer page. Includes the requested
        territory, its current LOD0 artifact (when present), all
        placements on it, and the list of available models with their
        artifacts for the placement picker.
      properties:
        territory: { $ref: '#/components/schemas/Territory' }
        artifact: { $ref: '#/components/schemas/Artifact' }
        placements:
          type: array
          items: { $ref: '#/components/schemas/Placement' }
        modelOptions:
          type: array
          items: { $ref: '#/components/schemas/AssetOption' }
        panoramas:
          type: array
          description: |
            Equirect panoramas anchored to this territory. The viewer
            renders them as toggleable alternate camera modes; placements
            stay shared between the 3D and panorama views.
          items: { $ref: '#/components/schemas/Panorama' }

    UploadInitiate:
      type: object
      required: [size]
      properties:
        size: { type: integer, format: int64, minimum: 1 }
        contentType: { type: string }

    UploadSession:
      type: object
      required: [id, size, offset]
      properties:
        id: { type: string }
        size: { type: integer, format: int64 }
        offset: { type: integer, format: int64 }
        contentType: { type: string }

    UploadFinalized:
      type: object
      required: [hash, size]
      properties:
        hash: { type: string }
        size: { type: integer, format: int64 }

    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Internal:
      description: Internal server error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

paths:
  /api/territories:
    get:
      operationId: listTerritories
      summary: List territories
      tags: [territories]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Territory' }
        '500': { $ref: '#/components/responses/Internal' }
    post:
      operationId: createTerritory
      summary: Register a territory and queue its conversion
      tags: [territories]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EntityCreate' }
      responses:
        '202':
          description: Territory created and conversion queued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TerritoryCreated' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/territories/{slug}:
    parameters:
      - name: slug
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getTerritory
      summary: Get a territory by slug
      tags: [territories]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Territory' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }
    patch:
      operationId: updateTerritory
      summary: Update mutable territory fields (no re-conversion)
      tags: [territories]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TerritoryUpdate' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Territory' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }
    delete:
      operationId: deleteTerritory
      summary: Delete a territory and its placements
      tags: [territories]
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/territories/{slug}/source:
    parameters:
      - name: slug
        in: path
        required: true
        schema: { type: string }
    post:
      operationId: replaceTerritorySource
      summary: Replace a territory's source archive and re-queue conversion
      description: |
        Swaps the territory's source ZIP in place and queues a fresh
        conversion. The territory (and its placements) are kept; existing
        artifacts are cleared so the viewer shows the conversion screen until
        the new mesh lands. Response mirrors createTerritory.
      tags: [territories]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TerritorySourceReplace' }
      responses:
        '202':
          description: Source replaced and conversion queued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TerritoryCreated' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/territories/{slug}/scene:
    parameters:
      - name: slug
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getSceneBundle
      summary: Single-shot bundle for the viewer page
      tags: [territories]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SceneBundle' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/territories/{slug}/artifacts:
    parameters:
      - name: slug
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: listTerritoryArtifacts
      summary: List converted artifacts for a territory
      tags: [territories]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Artifact' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/territories/{slug}/artifacts/{lod}:
    parameters:
      - name: slug
        in: path
        required: true
        schema: { type: string }
      - name: lod
        in: path
        required: true
        schema: { type: integer, format: int32, minimum: 0 }
    get:
      operationId: getTerritoryArtifact
      summary: Get one converted artifact (territory)
      tags: [territories]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Artifact' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/territories/{slug}/placements:
    parameters:
      - name: slug
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: listPlacements
      summary: List placements on a territory
      tags: [placements]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Placement' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }
    post:
      operationId: createPlacement
      summary: Add a placement to a territory
      tags: [placements]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PlacementCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Placement' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/territories/{slug}/placements/{id}:
    parameters:
      - name: slug
        in: path
        required: true
        schema: { type: string }
      - name: id
        in: path
        required: true
        schema: { type: integer, format: int64 }
    put:
      operationId: updatePlacement
      summary: Replace a placement's transform
      tags: [placements]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PlacementUpdate' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Placement' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }
    delete:
      operationId: deletePlacement
      summary: Remove a placement
      tags: [placements]
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/territories/{slug}/placements/{id}/visibility:
    parameters:
      - name: slug
        in: path
        required: true
        schema: { type: string }
      - name: id
        in: path
        required: true
        schema: { type: integer, format: int64 }
    put:
      operationId: setPlacementVisibility
      summary: Replace a placement's panorama allowlist
      tags: [placements]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PlacementVisibilityUpdate' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Placement' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/territories/{slug}/placements/{id}/panoramas/{panoramaId}/label:
    parameters:
      - name: slug
        in: path
        required: true
        schema: { type: string }
      - name: id
        in: path
        required: true
        schema: { type: integer, format: int64 }
      - name: panoramaId
        in: path
        required: true
        schema: { type: integer, format: int64 }
    put:
      operationId: setPlacementPanoramaLabel
      summary: Set a placement's name within one panorama
      tags: [placements]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PlacementPanoramaLabelUpdate' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Placement' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/territories/{slug}/panoramas:
    parameters:
      - name: slug
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: listPanoramas
      summary: List panoramas anchored to a territory
      tags: [panoramas]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Panorama' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }
    post:
      operationId: createPanorama
      summary: Anchor a new equirect panorama in the territory
      tags: [panoramas]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PanoramaCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Panorama' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/territories/{slug}/panoramas/{id}:
    parameters:
      - name: slug
        in: path
        required: true
        schema: { type: string }
      - name: id
        in: path
        required: true
        schema: { type: integer, format: int64 }
    put:
      operationId: updatePanorama
      summary: Replace a panorama's title, position, and yaw offset
      tags: [panoramas]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PanoramaUpdate' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Panorama' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }
    delete:
      operationId: deletePanorama
      summary: Remove a panorama
      tags: [panoramas]
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/models:
    get:
      operationId: listModels
      summary: List models
      tags: [models]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Model' }
        '500': { $ref: '#/components/responses/Internal' }
    post:
      operationId: createModel
      summary: Register a model and queue its conversion
      tags: [models]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EntityCreate' }
      responses:
        '202':
          description: Model created and conversion queued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ModelCreated' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/models/{slug}:
    parameters:
      - name: slug
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getModel
      summary: Get a model by slug
      tags: [models]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Model' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }
    delete:
      operationId: deleteModel
      summary: Delete a model
      description: Refuses to delete a model still referenced by placements.
      tags: [models]
      responses:
        '204': { description: Deleted }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/models/{slug}/artifacts:
    parameters:
      - name: slug
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: listModelArtifacts
      summary: List converted artifacts for a model
      tags: [models]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Artifact' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/models/{slug}/artifacts/{lod}:
    parameters:
      - name: slug
        in: path
        required: true
        schema: { type: string }
      - name: lod
        in: path
        required: true
        schema: { type: integer, format: int32, minimum: 0 }
    get:
      operationId: getModelArtifact
      summary: Get one converted artifact (model)
      tags: [models]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Artifact' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/uploads:
    post:
      operationId: initiateUpload
      summary: Start a chunked upload session
      tags: [uploads]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UploadInitiate' }
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UploadSession' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '500': { $ref: '#/components/responses/Internal' }

  /api/uploads/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    head:
      operationId: getUploadStatus
      summary: Query the current offset of a session
      tags: [uploads]
      responses:
        '200':
          description: OK
          headers:
            Upload-Offset:
              schema: { type: integer, format: int64 }
            Upload-Length:
              schema: { type: integer, format: int64 }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }
    patch:
      operationId: appendUploadChunk
      summary: Append bytes to a session at the given offset
      description: |
        Body is the raw chunk; the absolute byte offset goes in the
        `Upload-Offset` header. The server returns the new total in
        the `Upload-Offset` response header.
      tags: [uploads]
      parameters:
        - name: Upload-Offset
          in: header
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '204':
          description: Accepted; current offset returned in Upload-Offset
          headers:
            Upload-Offset:
              schema: { type: integer, format: int64 }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }
    delete:
      operationId: abortUpload
      summary: Discard an in-progress session
      tags: [uploads]
      responses:
        '204': { description: Aborted }
        '500': { $ref: '#/components/responses/Internal' }

  /api/uploads/{id}/finalize:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    post:
      operationId: finalizeUpload
      summary: Close a session and publish the bytes to BlobStore
      tags: [uploads]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UploadFinalized' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/Internal' }

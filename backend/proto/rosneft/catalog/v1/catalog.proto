syntax = "proto3";

package rosneft.catalog.v1;

option go_package = "github.com/vbncursed/rosneft/backend/proto/gen/go/rosneft/catalog/v1;catalogv1";

import "google/protobuf/timestamp.proto";

// CatalogService owns the project + artifact registry. Conversion pipelines
// (mesh-worker) write artifact records here; the gateway reads them to serve
// the frontend.
service CatalogService {
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);
  rpc GetProject(GetProjectRequest) returns (GetProjectResponse);
  rpc UpsertProject(UpsertProjectRequest) returns (UpsertProjectResponse);
  rpc RegisterArtifact(RegisterArtifactRequest) returns (RegisterArtifactResponse);
  rpc ListArtifacts(ListArtifactsRequest) returns (ListArtifactsResponse);
  rpc GetArtifact(GetArtifactRequest) returns (GetArtifactResponse);

  // Placements: a Placement is one instance of a child project (the asset)
  // positioned on a parent project's scene with a position/rotation/scale
  // transform. Used by the viewer to overlay equipment, fixtures, or other
  // CAD assets onto a base photogrammetry scene.
  rpc ListPlacements(ListPlacementsRequest) returns (ListPlacementsResponse);
  rpc CreatePlacement(CreatePlacementRequest) returns (CreatePlacementResponse);
  rpc UpdatePlacement(UpdatePlacementRequest) returns (UpdatePlacementResponse);
  rpc DeletePlacement(DeletePlacementRequest) returns (DeletePlacementResponse);
}

// Project is a 3D model project surfaced to the frontend catalog.
message Project {
  string slug = 1;
  string title = 2;
  string subtitle = 3;
  string description = 4;
  // Path to the source OBJ relative to the source root (mesh-worker reads it).
  string source_obj_path = 5;
  string source_mtl_path = 6;
  string source_texture_path = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

// Vec3 represents a point in 3D space (used for bounding-box corners).
message Vec3 {
  double x = 1;
  double y = 2;
  double z = 3;
}

// Artifact is a converted binary asset (GLB) for a specific project + LOD.
message Artifact {
  string project_slug = 1;
  // Level-of-detail: 0 = full quality, higher = more reduced.
  uint32 lod = 2;
  // Content hash used as the BlobStore key and as a strong ETag.
  string hash = 3;
  string content_type = 4;
  int64 size = 5;
  uint64 vertices = 6;
  uint64 faces = 7;
  Vec3 bbox_min = 8;
  Vec3 bbox_max = 9;
  google.protobuf.Timestamp created_at = 10;
}

message ListProjectsRequest {}
message ListProjectsResponse {
  repeated Project projects = 1;
}

message GetProjectRequest {
  string slug = 1;
}
message GetProjectResponse {
  Project project = 1;
}

message UpsertProjectRequest {
  Project project = 1;
}
message UpsertProjectResponse {
  Project project = 1;
}

message RegisterArtifactRequest {
  Artifact artifact = 1;
}
message RegisterArtifactResponse {
  Artifact artifact = 1;
}

message ListArtifactsRequest {
  string project_slug = 1;
}
message ListArtifactsResponse {
  repeated Artifact artifacts = 1;
}

message GetArtifactRequest {
  string project_slug = 1;
  uint32 lod = 2;
}
message GetArtifactResponse {
  Artifact artifact = 1;
}

// Placement is a positioned instance of an asset project on a parent project.
// position is in scene units; rotation is Euler XYZ in radians (Three.js
// convention); scale is per-axis to allow non-uniform stretching.
message Placement {
  int64 id = 1;
  string parent_slug = 2;
  string asset_slug = 3;
  Vec3 position = 4;
  Vec3 rotation = 5;
  Vec3 scale = 6;
  string label = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message ListPlacementsRequest {
  string parent_slug = 1;
}
message ListPlacementsResponse {
  repeated Placement placements = 1;
}

// CreatePlacementRequest carries the parent + asset references plus the
// initial transform. Fields with zero values are replaced with sensible
// defaults: scale {1,1,1}, position/rotation zeros.
message CreatePlacementRequest {
  string parent_slug = 1;
  string asset_slug = 2;
  Vec3 position = 3;
  Vec3 rotation = 4;
  Vec3 scale = 5;
  string label = 6;
}
message CreatePlacementResponse {
  Placement placement = 1;
}

// UpdatePlacementRequest replaces the placement's transform and label
// in full. Position, Rotation, Scale, and Label all become whatever is sent;
// no per-field merge.
message UpdatePlacementRequest {
  int64 id = 1;
  Vec3 position = 2;
  Vec3 rotation = 3;
  Vec3 scale = 4;
  string label = 5;
}
message UpdatePlacementResponse {
  Placement placement = 1;
}

message DeletePlacementRequest {
  int64 id = 1;
}
message DeletePlacementResponse {}

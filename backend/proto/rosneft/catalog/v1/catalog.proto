syntax = "proto3";

package rosneft.catalog.v1;

option go_package = "github.com/vbncursed/rosneft/backend/proto/gen/go/rosneft/catalog/v1;catalogv1";

import "google/protobuf/timestamp.proto";

// CatalogService owns the registry of two domain entities:
//
//   - Territory — a parent scene (terrain, photogrammetry mesh) the
//     viewer walks around in.
//   - Model     — a placeable asset (equipment, fixture) overlaid on a
//     territory at a specific transform.
//
// Each entity has its own artifact family (territory_artifacts /
// model_artifacts) holding the converted GLB outputs per LOD. Source
// files are stored as content-addressed ZIP archives in BlobStore;
// the catalog only keeps the hash.
service CatalogService {
  rpc ListTerritories(ListTerritoriesRequest) returns (ListTerritoriesResponse);
  rpc GetTerritory(GetTerritoryRequest) returns (GetTerritoryResponse);
  rpc UpsertTerritory(UpsertTerritoryRequest) returns (UpsertTerritoryResponse);
  rpc DeleteTerritory(DeleteTerritoryRequest) returns (DeleteTerritoryResponse);
  rpc RegisterTerritoryArtifact(RegisterTerritoryArtifactRequest) returns (RegisterTerritoryArtifactResponse);
  rpc ListTerritoryArtifacts(ListTerritoryArtifactsRequest) returns (ListTerritoryArtifactsResponse);
  rpc GetTerritoryArtifact(GetTerritoryArtifactRequest) returns (GetTerritoryArtifactResponse);

  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);
  rpc GetModel(GetModelRequest) returns (GetModelResponse);
  rpc UpsertModel(UpsertModelRequest) returns (UpsertModelResponse);
  rpc DeleteModel(DeleteModelRequest) returns (DeleteModelResponse);
  rpc RegisterModelArtifact(RegisterModelArtifactRequest) returns (RegisterModelArtifactResponse);
  rpc ListModelArtifacts(ListModelArtifactsRequest) returns (ListModelArtifactsResponse);
  rpc GetModelArtifact(GetModelArtifactRequest) returns (GetModelArtifactResponse);

  rpc ListPlacements(ListPlacementsRequest) returns (ListPlacementsResponse);
  rpc CreatePlacement(CreatePlacementRequest) returns (CreatePlacementResponse);
  rpc UpdatePlacement(UpdatePlacementRequest) returns (UpdatePlacementResponse);
  rpc DeletePlacement(DeletePlacementRequest) returns (DeletePlacementResponse);
}

// Vec3 represents a point in 3D space (used for bounding-box corners
// and placement transforms).
message Vec3 {
  double x = 1;
  double y = 2;
  double z = 3;
}

// Territory is a scene the viewer renders as the parent canvas.
// source_blob_hash points at the ZIP archive in BlobStore that
// contains the original OBJ, MTL, and texture files.
message Territory {
  string slug = 1;
  string title = 2;
  string description = 3;
  string source_blob_hash = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

// Model is a placeable 3D asset overlaid on a territory.
message Model {
  string slug = 1;
  string title = 2;
  string description = 3;
  string source_blob_hash = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

// TerritoryArtifact is a converted GLB output for one territory + LOD.
message TerritoryArtifact {
  string territory_slug = 1;
  uint32 lod = 2;
  string hash = 3;
  string content_type = 4;
  int64 size = 5;
  uint64 vertices = 6;
  uint64 faces = 7;
  Vec3 bbox_min = 8;
  Vec3 bbox_max = 9;
  google.protobuf.Timestamp created_at = 10;
}

// ModelArtifact is a converted GLB output for one model + LOD.
message ModelArtifact {
  string model_slug = 1;
  uint32 lod = 2;
  string hash = 3;
  string content_type = 4;
  int64 size = 5;
  uint64 vertices = 6;
  uint64 faces = 7;
  Vec3 bbox_min = 8;
  Vec3 bbox_max = 9;
  google.protobuf.Timestamp created_at = 10;
}

// Placement is one instance of a model overlaid on a territory at a
// specific transform. Position is in scene units; rotation is Euler XYZ
// in radians (Three.js convention); scale is per-axis to allow
// non-uniform stretching.
message Placement {
  int64 id = 1;
  string territory_slug = 2;
  string model_slug = 3;
  Vec3 position = 4;
  Vec3 rotation = 5;
  Vec3 scale = 6;
  string label = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

// ─── Territory RPCs ─────────────────────────────────────────────────────────

message ListTerritoriesRequest {}
message ListTerritoriesResponse {
  repeated Territory territories = 1;
}

message GetTerritoryRequest {
  string slug = 1;
}
message GetTerritoryResponse {
  Territory territory = 1;
}

message UpsertTerritoryRequest {
  Territory territory = 1;
}
message UpsertTerritoryResponse {
  Territory territory = 1;
}

message DeleteTerritoryRequest {
  string slug = 1;
}
message DeleteTerritoryResponse {}

message RegisterTerritoryArtifactRequest {
  TerritoryArtifact artifact = 1;
}
message RegisterTerritoryArtifactResponse {
  TerritoryArtifact artifact = 1;
}

message ListTerritoryArtifactsRequest {
  string territory_slug = 1;
}
message ListTerritoryArtifactsResponse {
  repeated TerritoryArtifact artifacts = 1;
}

message GetTerritoryArtifactRequest {
  string territory_slug = 1;
  uint32 lod = 2;
}
message GetTerritoryArtifactResponse {
  TerritoryArtifact artifact = 1;
}

// ─── Model RPCs ─────────────────────────────────────────────────────────────

message ListModelsRequest {}
message ListModelsResponse {
  repeated Model models = 1;
}

message GetModelRequest {
  string slug = 1;
}
message GetModelResponse {
  Model model = 1;
}

message UpsertModelRequest {
  Model model = 1;
}
message UpsertModelResponse {
  Model model = 1;
}

message DeleteModelRequest {
  string slug = 1;
}
message DeleteModelResponse {}

message RegisterModelArtifactRequest {
  ModelArtifact artifact = 1;
}
message RegisterModelArtifactResponse {
  ModelArtifact artifact = 1;
}

message ListModelArtifactsRequest {
  string model_slug = 1;
}
message ListModelArtifactsResponse {
  repeated ModelArtifact artifacts = 1;
}

message GetModelArtifactRequest {
  string model_slug = 1;
  uint32 lod = 2;
}
message GetModelArtifactResponse {
  ModelArtifact artifact = 1;
}

// ─── Placement RPCs ─────────────────────────────────────────────────────────

message ListPlacementsRequest {
  string territory_slug = 1;
}
message ListPlacementsResponse {
  repeated Placement placements = 1;
}

message CreatePlacementRequest {
  string territory_slug = 1;
  string model_slug = 2;
  Vec3 position = 3;
  Vec3 rotation = 4;
  Vec3 scale = 5;
  string label = 6;
}
message CreatePlacementResponse {
  Placement placement = 1;
}

message UpdatePlacementRequest {
  int64 id = 1;
  Vec3 position = 2;
  Vec3 rotation = 3;
  Vec3 scale = 4;
  string label = 5;
}
message UpdatePlacementResponse {
  Placement placement = 1;
}

message DeletePlacementRequest {
  int64 id = 1;
}
message DeletePlacementResponse {}

{
  "apiVersion": 1,
  "groups": [
    {
      "orgId": 1,
      "name": "andrey-core",
      "folder": "Andrey",
      "interval": "1m",
      "rules": [
        {
          "uid": "target-down",
          "title": "TargetDown",
          "condition": "C",
          "for": "1m",
          "noDataState": "OK",
          "execErrState": "Error",
          "labels": {
            "severity": "critical"
          },
          "annotations": {
            "summary": "A service target is down"
          },
          "data": [
            {
              "refId": "A",
              "relativeTimeRange": {
                "from": 600,
                "to": 0
              },
              "datasourceUid": "prometheus",
              "model": {
                "refId": "A",
                "instant": true,
                "editorMode": "code",
                "expr": "up{job=\"services\"} == 0",
                "intervalMs": 1000,
                "maxDataPoints": 43200
              }
            },
            {
              "refId": "C",
              "relativeTimeRange": {
                "from": 600,
                "to": 0
              },
              "datasourceUid": "__expr__",
              "model": {
                "refId": "C",
                "type": "threshold",
                "expression": "A",
                "conditions": [
                  {
                    "evaluator": {
                      "type": "gt",
                      "params": [
                        0
                      ]
                    }
                  }
                ]
              }
            }
          ]
        },
        {
          "uid": "grpc-error-rate",
          "title": "HighGrpcErrorRate",
          "condition": "C",
          "for": "5m",
          "noDataState": "OK",
          "execErrState": "Error",
          "labels": {
            "severity": "warning"
          },
          "annotations": {
            "summary": "gRPC error rate above 5%"
          },
          "data": [
            {
              "refId": "A",
              "relativeTimeRange": {
                "from": 600,
                "to": 0
              },
              "datasourceUid": "prometheus",
              "model": {
                "refId": "A",
                "instant": true,
                "editorMode": "code",
                "expr": "sum by (service)(rate(grpc_server_handled_total{grpc_code!=\"OK\"}[5m])) / clamp_min(sum by (service)(rate(grpc_server_handled_total[5m])),0.001) > 0.05",
                "intervalMs": 1000,
                "maxDataPoints": 43200
              }
            },
            {
              "refId": "C",
              "relativeTimeRange": {
                "from": 600,
                "to": 0
              },
              "datasourceUid": "__expr__",
              "model": {
                "refId": "C",
                "type": "threshold",
                "expression": "A",
                "conditions": [
                  {
                    "evaluator": {
                      "type": "gt",
                      "params": [
                        0
                      ]
                    }
                  }
                ]
              }
            }
          ]
        },
        {
          "uid": "http-5xx-rate",
          "title": "HighHttp5xxRate",
          "condition": "C",
          "for": "5m",
          "noDataState": "OK",
          "execErrState": "Error",
          "labels": {
            "severity": "warning"
          },
          "annotations": {
            "summary": "HTTP 5xx rate above 5%"
          },
          "data": [
            {
              "refId": "A",
              "relativeTimeRange": {
                "from": 600,
                "to": 0
              },
              "datasourceUid": "prometheus",
              "model": {
                "refId": "A",
                "instant": true,
                "editorMode": "code",
                "expr": "sum(rate(http_requests_total{code=~\"5..\"}[5m])) / clamp_min(sum(rate(http_requests_total[5m])),0.001) > 0.05",
                "intervalMs": 1000,
                "maxDataPoints": 43200
              }
            },
            {
              "refId": "C",
              "relativeTimeRange": {
                "from": 600,
                "to": 0
              },
              "datasourceUid": "__expr__",
              "model": {
                "refId": "C",
                "type": "threshold",
                "expression": "A",
                "conditions": [
                  {
                    "evaluator": {
                      "type": "gt",
                      "params": [
                        0
                      ]
                    }
                  }
                ]
              }
            }
          ]
        },
        {
          "uid": "latency-p99",
          "title": "HighLatencyP99",
          "condition": "C",
          "for": "10m",
          "noDataState": "OK",
          "execErrState": "Error",
          "labels": {
            "severity": "warning"
          },
          "annotations": {
            "summary": "gRPC p99 latency above 2s"
          },
          "data": [
            {
              "refId": "A",
              "relativeTimeRange": {
                "from": 600,
                "to": 0
              },
              "datasourceUid": "prometheus",
              "model": {
                "refId": "A",
                "instant": true,
                "editorMode": "code",
                "expr": "histogram_quantile(0.99, sum by (le,grpc_service)(rate(grpc_server_handling_seconds_bucket[5m]))) > 2",
                "intervalMs": 1000,
                "maxDataPoints": 43200
              }
            },
            {
              "refId": "C",
              "relativeTimeRange": {
                "from": 600,
                "to": 0
              },
              "datasourceUid": "__expr__",
              "model": {
                "refId": "C",
                "type": "threshold",
                "expression": "A",
                "conditions": [
                  {
                    "evaluator": {
                      "type": "gt",
                      "params": [
                        0
                      ]
                    }
                  }
                ]
              }
            }
          ]
        },
        {
          "uid": "conversion-failures",
          "title": "ConversionFailures",
          "condition": "C",
          "for": "5m",
          "noDataState": "OK",
          "execErrState": "Error",
          "labels": {
            "severity": "warning"
          },
          "annotations": {
            "summary": "Mesh conversions are failing"
          },
          "data": [
            {
              "refId": "A",
              "relativeTimeRange": {
                "from": 600,
                "to": 0
              },
              "datasourceUid": "prometheus",
              "model": {
                "refId": "A",
                "instant": true,
                "editorMode": "code",
                "expr": "rate(mesh_conversions_total{status=\"failed\"}[10m]) > 0",
                "intervalMs": 1000,
                "maxDataPoints": 43200
              }
            },
            {
              "refId": "C",
              "relativeTimeRange": {
                "from": 600,
                "to": 0
              },
              "datasourceUid": "__expr__",
              "model": {
                "refId": "C",
                "type": "threshold",
                "expression": "A",
                "conditions": [
                  {
                    "evaluator": {
                      "type": "gt",
                      "params": [
                        0
                      ]
                    }
                  }
                ]
              }
            }
          ]
        },
        {
          "uid": "memory-growth",
          "title": "MemoryGrowth",
          "condition": "C",
          "for": "15m",
          "noDataState": "OK",
          "execErrState": "Error",
          "labels": {
            "severity": "warning"
          },
          "annotations": {
            "summary": "A service is using over 1.5GB RSS"
          },
          "data": [
            {
              "refId": "A",
              "relativeTimeRange": {
                "from": 600,
                "to": 0
              },
              "datasourceUid": "prometheus",
              "model": {
                "refId": "A",
                "instant": true,
                "editorMode": "code",
                "expr": "process_resident_memory_bytes > 1.5e9",
                "intervalMs": 1000,
                "maxDataPoints": 43200
              }
            },
            {
              "refId": "C",
              "relativeTimeRange": {
                "from": 600,
                "to": 0
              },
              "datasourceUid": "__expr__",
              "model": {
                "refId": "C",
                "type": "threshold",
                "expression": "A",
                "conditions": [
                  {
                    "evaluator": {
                      "type": "gt",
                      "params": [
                        0
                      ]
                    }
                  }
                ]
              }
            }
          ]
        },
        {
          "uid": "queue-backlog",
          "title": "QueueBacklog",
          "condition": "C",
          "for": "10m",
          "noDataState": "OK",
          "execErrState": "Error",
          "labels": {
            "severity": "warning"
          },
          "annotations": {
            "summary": "Mesh worker pulling full batches for 10m (stream backlog)"
          },
          "data": [
            {
              "refId": "A",
              "relativeTimeRange": {
                "from": 600,
                "to": 0
              },
              "datasourceUid": "prometheus",
              "model": {
                "refId": "A",
                "instant": true,
                "editorMode": "code",
                "expr": "mesh_queue_depth >= 16",
                "intervalMs": 1000,
                "maxDataPoints": 43200
              }
            },
            {
              "refId": "C",
              "relativeTimeRange": {
                "from": 600,
                "to": 0
              },
              "datasourceUid": "__expr__",
              "model": {
                "refId": "C",
                "type": "threshold",
                "expression": "A",
                "conditions": [
                  {
                    "evaluator": {
                      "type": "gt",
                      "params": [
                        0
                      ]
                    }
                  }
                ]
              }
            }
          ]
        },
        {
          "uid": "login-failure-spike",
          "title": "LoginFailureSpike",
          "condition": "C",
          "for": "5m",
          "noDataState": "OK",
          "execErrState": "Error",
          "labels": {
            "severity": "warning"
          },
          "annotations": {
            "summary": "Login failures above 30/min (possible brute force)"
          },
          "data": [
            {
              "refId": "A",
              "relativeTimeRange": {
                "from": 600,
                "to": 0
              },
              "datasourceUid": "prometheus",
              "model": {
                "refId": "A",
                "instant": true,
                "editorMode": "code",
                "expr": "rate(auth_logins_total{status=\"failed\"}[5m]) * 60 > 30",
                "intervalMs": 1000,
                "maxDataPoints": 43200
              }
            },
            {
              "refId": "C",
              "relativeTimeRange": {
                "from": 600,
                "to": 0
              },
              "datasourceUid": "__expr__",
              "model": {
                "refId": "C",
                "type": "threshold",
                "expression": "A",
                "conditions": [
                  {
                    "evaluator": {
                      "type": "gt",
                      "params": [
                        0
                      ]
                    }
                  }
                ]
              }
            }
          ]
        }
      ]
    }
  ]
}

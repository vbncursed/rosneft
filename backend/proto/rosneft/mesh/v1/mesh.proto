syntax = "proto3";

package rosneft.mesh.v1;

option go_package = "github.com/vbncursed/rosneft/backend/proto/gen/go/rosneft/mesh/v1;meshv1";

import "google/protobuf/timestamp.proto";

// MeshService accepts conversion jobs and reports their status. The actual
// CPU-heavy work happens in mesh-worker, which consumes from Redis Streams,
// fetches the source ZIP archive from BlobStore by hash, extracts it, runs
// the converter + gltfpack pipeline, and registers each LOD artifact with
// the catalog (territory_artifacts or model_artifacts depending on Kind).
service MeshService {
  // SubmitConversion enqueues a conversion job for the given target. Returns
  // the job state immediately; the actual conversion runs asynchronously.
  rpc SubmitConversion(SubmitConversionRequest) returns (SubmitConversionResponse);

  // GetJob returns the current state of a conversion job.
  rpc GetJob(GetJobRequest) returns (GetJobResponse);
}

// Kind discriminates whether a job's output artifacts belong on a Territory
// or a Model in the catalog. The conversion pipeline is identical for both;
// only the destination artifact table differs.
enum Kind {
  KIND_UNSPECIFIED = 0;
  KIND_TERRITORY = 1;
  KIND_MODEL = 2;
}

enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  JOB_STATUS_PENDING = 1;
  JOB_STATUS_RUNNING = 2;
  JOB_STATUS_SUCCEEDED = 3;
  JOB_STATUS_FAILED = 4;
}

message Job {
  string id = 1;
  Kind kind = 2;
  string slug = 3;
  JobStatus status = 4;
  // ErrorMessage is set when status == JOB_STATUS_FAILED.
  string error_message = 5;
  // ArtifactHash is set when status == JOB_STATUS_SUCCEEDED.
  string artifact_hash = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message SubmitConversionRequest {
  Kind kind = 1;
  string slug = 2;
}

message SubmitConversionResponse {
  Job job = 1;
}

message GetJobRequest {
  string id = 1;
}

message GetJobResponse {
  Job job = 1;
}
